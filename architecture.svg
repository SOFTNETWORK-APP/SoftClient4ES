<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 600" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="replGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="extGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="gwGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="esGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="600" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="390" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">SoftClient4ES Architecture</text>

  <!-- ═══ Layer 1: REPL + Your Application ═══ -->

  <rect x="40" y="58" width="160" height="50" rx="10" fill="url(#replGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="120" y="80" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">REPL</text>
  <text x="120" y="96" text-anchor="middle" fill="#c7d2fe" font-size="9">Interactive CLI</text>
  <!-- Apache 2.0 badge -->
  <rect x="142" y="62" width="52" height="14" rx="7" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="168" y="72" text-anchor="middle" fill="#93c5fd" font-size="7" font-weight="500">Apache 2.0</text>

  <rect x="220" y="58" width="530" height="50" rx="10" fill="url(#appGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="485" y="78" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Your Application</text>
  <text x="485" y="96" text-anchor="middle" fill="#e0e7ff" font-size="10">Superset · Grafana · DBeaver · Custom apps</text>

  <!-- ═══ Layer 2: Connectors (JDBC + ADBC + Flight SQL) ═══ -->

  <!-- Arrows down from App to connectors -->
  <line x1="307" y1="108" x2="307" y2="128" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="480" y1="108" x2="480" y2="128" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="657" y1="108" x2="657" y2="128" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- JDBC Driver -->
  <rect x="225" y="130" width="165" height="46" rx="10" fill="url(#clientGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="307" y="152" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">JDBC Driver</text>
  <text x="307" y="166" text-anchor="middle" fill="#e0e7ff" font-size="9">Type 4 · In-process</text>
  <!-- Elastic v2 badge -->
  <rect x="352" y="134" width="32" height="14" rx="7" fill="#4c1d95" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="368" y="144" text-anchor="middle" fill="#c4b5fd" font-size="7" font-weight="500">ELv2</text>

  <!-- ADBC Driver -->
  <rect x="400" y="130" width="160" height="46" rx="10" fill="url(#clientGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="480" y="152" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">ADBC Driver</text>
  <text x="480" y="166" text-anchor="middle" fill="#e0e7ff" font-size="9">In-process · Columnar</text>
  <!-- Elastic v2 badge -->
  <rect x="522" y="134" width="32" height="14" rx="7" fill="#4c1d95" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="538" y="144" text-anchor="middle" fill="#c4b5fd" font-size="7" font-weight="500">ELv2</text>

  <!-- Arrow Flight SQL -->
  <rect x="570" y="130" width="175" height="46" rx="10" fill="url(#clientGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="657" y="152" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Arrow Flight SQL</text>
  <text x="657" y="166" text-anchor="middle" fill="#e0e7ff" font-size="9">gRPC · Columnar</text>
  <!-- Elastic v2 badge -->
  <rect x="707" y="134" width="32" height="14" rx="7" fill="#4c1d95" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="723" y="144" text-anchor="middle" fill="#c4b5fd" font-size="7" font-weight="500">ELv2</text>

  <!-- ═══ Layer 3: GatewayApi + Extensions ═══ -->

  <!-- Arrows down: REPL to GatewayApi -->
  <line x1="120" y1="108" x2="120" y2="196" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="112,194 120,208 128,194" fill="#60a5fa" opacity="0.7"/>
  <!-- JDBC + ADBC + Flight SQL: vertical down, horizontal bus, vertical down to GatewayApi -->
  <line x1="307" y1="176" x2="307" y2="190" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="480" y1="176" x2="480" y2="190" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="657" y1="176" x2="657" y2="190" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="307" y1="190" x2="657" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="480" y1="190" x2="480" y2="196" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="472,194 480,208 488,194" fill="#94a3b8" opacity="0.6"/>

  <!-- GatewayApi -->
  <rect x="40" y="210" width="500" height="56" rx="10" fill="url(#gwGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="290" y="234" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Unified GatewayApi</text>
  <text x="290" y="254" text-anchor="middle" fill="#cffafe" font-size="11">run(sql) → Future[ElasticResult[QueryResult]]</text>
  <!-- Apache 2.0 badge -->
  <rect x="472" y="214" width="52" height="14" rx="7" fill="#164e63" stroke="#06b6d4" stroke-width="0.5"/>
  <text x="498" y="224" text-anchor="middle" fill="#67e8f9" font-size="7" font-weight="500">Apache 2.0</text>

  <!-- Extensions -->
  <rect x="556" y="210" width="194" height="56" rx="10" fill="url(#extGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="653" y="234" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Extensions</text>
  <text x="653" y="254" text-anchor="middle" fill="#fed7aa" font-size="10">Materialized Views · SPI</text>
  <!-- Elastic v2 badge -->
  <rect x="688" y="214" width="52" height="14" rx="7" fill="#7c2d12" stroke="#ea580c" stroke-width="0.5"/>
  <text x="714" y="224" text-anchor="middle" fill="#fdba74" font-size="7" font-weight="500">Elastic v2</text>

  <!-- Connector Extensions → GatewayApi -->
  <line x1="540" y1="238" x2="556" y2="238" stroke="#f97316" stroke-width="1.5"/>
  <polygon points="552,234 560,238 552,242" fill="#f97316" opacity="0.7"/>

  <!-- ═══ Layer 4: SQL Engine ═══ -->

  <!-- Arrow down from GatewayApi to SQL Engine -->
  <line x1="390" y1="266" x2="390" y2="296" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="382,294 390,308 398,294" fill="#94a3b8" opacity="0.6"/>

  <rect x="40" y="310" width="710" height="76" rx="10" fill="url(#coreGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="395" y="340" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">SQL Engine (Core)</text>
  <g fill="#bfdbfe" font-size="12" text-anchor="middle">
    <text x="200" y="368">Parser</text>
    <text x="290" y="368" fill="#64748b" font-size="16">→</text>
    <text x="360" y="368">AST</text>
    <text x="430" y="368" fill="#64748b" font-size="16">→</text>
    <text x="530" y="368">ES Query DSL</text>
  </g>
  <!-- Apache 2.0 badge -->
  <rect x="660" y="322" width="72" height="16" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="696" y="333" text-anchor="middle" fill="#93c5fd" font-size="8" font-weight="500">Apache 2.0</text>

  <!-- ═══ Layer 5: ES Versions ═══ -->

  <!-- Arrows down -->
  <line x1="130" y1="386" x2="130" y2="416" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="310" y1="386" x2="310" y2="416" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="490" y1="386" x2="490" y2="416" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="665" y1="386" x2="665" y2="416" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="45" y="418" width="165" height="52" rx="10" fill="url(#esGrad)" filter="url(#shadow)" opacity="0.85"/>
  <text x="127" y="440" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">ES 6</text>
  <text x="127" y="458" text-anchor="middle" fill="#d1fae5" font-size="9">Jest / REST client</text>

  <rect x="222" y="418" width="165" height="52" rx="10" fill="url(#esGrad)" filter="url(#shadow)" opacity="0.85"/>
  <text x="304" y="440" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">ES 7</text>
  <text x="304" y="458" text-anchor="middle" fill="#d1fae5" font-size="9">REST client</text>

  <rect x="399" y="418" width="165" height="52" rx="10" fill="url(#esGrad)" filter="url(#shadow)" opacity="0.85"/>
  <text x="481" y="440" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">ES 8</text>
  <text x="481" y="458" text-anchor="middle" fill="#d1fae5" font-size="9">Java client</text>

  <rect x="576" y="418" width="165" height="52" rx="10" fill="url(#esGrad)" filter="url(#shadow)" opacity="0.85"/>
  <text x="658" y="440" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">ES 9</text>
  <text x="658" y="458" text-anchor="middle" fill="#d1fae5" font-size="9">Java client</text>

  <!-- SPI note -->
  <rect x="270" y="490" width="240" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="390" y="509" text-anchor="middle" fill="#94a3b8" font-size="10">SPI discovery via ServiceLoader</text>
</svg>
